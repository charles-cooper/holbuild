name: 'Setup HOL4'
description: 'Builds/restores HOL4 and sets HOLDIR'

inputs:
  hol4-ref:
    description: 'HOL4 git ref to use'
    required: false
    default: 'master'
  polyml-rev:
    description: 'Resolved Poly/ML revision, used in cache key'
    required: true

outputs:
  hol4-rev:
    description: 'Resolved HOL4 git revision'
    value: ${{ steps.version.outputs.hol4-rev }}

runs:
  using: 'composite'
  steps:
    - name: Resolve HOL4 version
      id: version
      shell: bash
      env:
        HOL4_REF: ${{ inputs.hol4-ref }}
      run: |
        if [[ "$HOL4_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
          rev="$HOL4_REF"
        else
          rev=$(git ls-remote https://github.com/HOL-Theorem-Prover/HOL.git "$HOL4_REF" | cut -f1)
        fi
        if [[ -z "$rev" ]]; then
          echo "Could not resolve HOL4 ref: $HOL4_REF" >&2
          exit 1
        fi
        echo "hol4-rev=$rev" >> "$GITHUB_OUTPUT"

    - name: Cache HOL4
      uses: actions/cache@v5
      id: cache-hol4
      with:
        path: ~/HOL
        key: hol-${{ runner.os }}-${{ inputs.polyml-rev }}-${{ steps.version.outputs.hol4-rev }}

    - name: Build HOL4
      if: steps.cache-hol4.outputs.cache-hit != 'true'
      shell: bash
      env:
        HOL4_REV: ${{ steps.version.outputs.hol4-rev }}
      run: |
        git clone https://github.com/HOL-Theorem-Prover/HOL.git ~/HOL
        cd ~/HOL
        git checkout --detach "$HOL4_REV"
        poly < tools/smart-configure.sml
        bin/build

    - name: Add HOL4 to PATH and set HOLDIR
      shell: bash
      run: |
        echo "$HOME/HOL/bin" >> "$GITHUB_PATH"
        echo "HOLDIR=$HOME/HOL" >> "$GITHUB_ENV"
