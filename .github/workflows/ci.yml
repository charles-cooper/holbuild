name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      hol4-ref:
        description: 'HOL4 git ref to test against; defaults to PINS/hol.txt'
        required: false
        default: ''
      test-jobs:
        description: 'Number of holbuild test cases to run concurrently'
        required: false
        default: '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read HOL4 pin
        id: hol4-pin
        run: echo "hol4-ref=$(tr -d '[:space:]' < PINS/hol.txt)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-polyml
        id: polyml

      - name: Configure holbuild test cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore HOL toolchain cache
        id: hol-toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ inputs.hol4-ref || steps.hol4-pin.outputs.hol4-ref }}-v2

      - name: Setup schema2 HOL cache
        run: tools/setup-hol-toolchain-cache.sh "${{ inputs.hol4-ref || steps.hol4-pin.outputs.hol4-ref }}" >> "$GITHUB_ENV"

      - name: Save HOL toolchain cache
        if: steps.hol-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ inputs.hol4-ref || steps.hol4-pin.outputs.hol4-ref }}-v2

      - name: Build holbuild
        run: make HOLDIR="$HOLDIR"

      - name: Run tests
        env:
          TMPDIR: ${{ runner.temp }}
          HOLBUILD_TEST_JOBS: ${{ inputs.test-jobs || '4' }}
        run: make HOLDIR="$HOLDIR" test
