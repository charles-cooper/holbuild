name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      test-jobs:
        description: 'Number of holbuild test cases to run concurrently'
        required: false
        default: '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read HOL4 pin
        id: hol4-pin
        run: echo "hol4-ref=$(tr -d '[:space:]' < vendor/hol/REV)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-polyml
        id: polyml

      - uses: ./.github/actions/setup-trknl-polyml
        id: trknl-polyml

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y inotify-tools

      - name: Configure holbuild test cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore HOL toolchain cache
        id: hol-toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Restore traced HOL toolchain cache
        id: hol-toolchain-trknl-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-trknl-${{ runner.os }}-${{ steps.trknl-polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Setup schema2 HOL cache
        run: |
          tools/setup-hol-toolchain-cache.sh "${{ steps.hol4-pin.outputs.hol4-ref }}" >> "$GITHUB_ENV"
          HOLBUILD_POLY="${{ steps.trknl-polyml.outputs.polyml-bin }}" tools/setup-hol-toolchain-cache.sh "${{ steps.hol4-pin.outputs.hol4-ref }}" trknl
          echo "HOLBUILD_TRKNL_POLY=${{ steps.trknl-polyml.outputs.polyml-bin }}" >> "$GITHUB_ENV"

      - name: Save HOL toolchain cache
        if: steps.hol-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Save traced HOL toolchain cache
        if: steps.hol-toolchain-trknl-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-trknl-${{ runner.os }}-${{ steps.trknl-polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Build holbuild
        run: make

      - name: Run tests
        env:
          TMPDIR: ${{ runner.temp }}
          HOLBUILD_TEST_JOBS: ${{ inputs.test-jobs || '4' }}
        run: make HOLDIR="$HOLDIR" test
